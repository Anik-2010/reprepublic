<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REP REPUBLIC</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#loginScreen {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  box-shadow: 0 0 20px rgba(0,255,100,0.3);
}

#loginScreen h2 {
  text-align: center;
}

label {
  margin-top: 10px;
  display: block;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  background: #2a2a2a;
  border: none;
  border-radius: 6px;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  background: #00ff88;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="loginScreen">
  <h2>REP REPUBLIC 💪</h2>

  <label>Your Name</label>
  <input type="text" id="name">

  <label>Phone Number</label>
  <input type="text" id="phone">

  <label>Email Address</label>
  <input type="email" id="email">

  <button onclick="doLogin()">LET'S GRIND</button>
</div>

<script>
async function doLogin() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!name || !phone || !email) {
    alert("Please fill all fields");
    return;
  }

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, phone, email })
    });

    const data = await res.json();

    if (data.success) {
      alert("Login successful! Check your email 📩");
    } else {
      alert("Email not sent ❌");
    }

  } catch (error) {
    alert("Server error ❌");
  }
}
</script>

</body>
</html>
