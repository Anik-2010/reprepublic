<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REP REPUBLIC</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* LOGIN SCREEN */
#loginScreen {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  box-shadow: 0 0 20px rgba(0,255,100,0.3);
}

#loginScreen h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  display: block;
  margin-top: 10px;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
  background: #2a2a2a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  background: #00ff88;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00cc6a;
}

/* MAIN APP */
#app {
  display: none;
  text-align: center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>REP REPUBLIC 💪</h2>

  <label>Your Name</label>
  <input type="text" id="name" placeholder="Your Name">

  <label>Phone Number</label>
  <input type="text" id="phone" placeholder="Phone Number">

  <label>Email Address</label>
  <input type="email" id="email" placeholder="Email Address">

  <button onclick="doLogin()">LET'S GRIND</button>
</div>

<!-- MAIN APP -->
<div id="app">
  <h1 id="welcomeText"></h1>
  <p>You're logged in successfully 🔥</p>
  <button onclick="logout()">Logout</button>
</div>

<script>
function doLogin() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!name || !phone || !email) {
    alert("Please fill all fields");
    return;
  }

  const user = {
    name: name,
    phone: phone,
    email: email
  };

  localStorage.setItem("rep_user", JSON.stringify(user));

  loadApp();
}

function loadApp() {
  const user = JSON.parse(localStorage.getItem("rep_user"));

  if (!user) return;

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("welcomeText").innerText =
    "Welcome, " + user.name + " 💪";
}

function logout() {
  localStorage.removeItem("rep_user");
  location.reload();
}

// Auto login
window.onload = loadApp;
</script>

</body>
</html>
